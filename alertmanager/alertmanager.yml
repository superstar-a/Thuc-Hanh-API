global:
  slack_api_url: "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK" # Thay bằng URL webhook thật của nhóm bạn nếu cần test gửi tin nhắn

route:
  receiver: "slack-notifications"
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 1h

receivers:
  - name: "slack-notifications"
    slack_configs:
      - channel: "#fb-api-alerts"
        send_resolved: true
        title: "[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}"